Package:
  CSPName: Flock Safety
  CSO: Flock Safety Platform
  impact: Low
  summaryOfCSO: 'Flock Safety is a public safety solution that assists cities, businesses, schools, and law enforcement agencies in collaboratively eliminating crime and maintaining community safety. Flock develops and manufactures license plate reading (LPR) technology, audio recognition sensors, video cameras, and accompanying software to capture objective evidence required by law enforcement to solve crimes.'
  Assessments:
  - Assessment:
      digitalSignature: bca7a2418c7ae582a6a3fb6c68f5d5c39ce31bec4153a3b302841e86eedfc5e2
      assessorOrg: Moss Adams LLP
      date: 6/13/2025
      leadAssessor: Scott Hoopes
      recommendation: Authorize
      remarks: |
        'Flock Safety demonstrated a sufficient security posture and achieved satisfactory results against most FedRAMP Low Key Security Indicators (KSIs). Flock was able to quickly provide strong evidence of passed KSI implementations, often exceeding the Low baseline requirements. Furthermore, Flock maintains a mature Governance, Risk, and Compliance (GRC) framework and takes a proactive approach to managing security and compliance obligations.'
      assessmentMethodology: |
        'Moss Adams, LLP (Moss Adams) is the accredited FedRAMP Third Party Assessment Organization (3PAO) for Flock Safety (Flock) for the FedRAMP 20x pilot assessment of Flock's product, Flock Safety Platform. Moss Adams performed an assessment of the Key Security Indicators (KSIs) for Flock Safety Platform. The assessment methodology included documentation reviews, direct system observations, interviews, configuration testing, and evaluation of manual control implementations. Each KSI was tested and evaluated against the provided KSI requirements and FedRAMP requirements to determine whether Flock Safety Platform fully met, partially met, or did not meet the specified criteria. The results of this evaluation have been documented in a machine-readable format, with each KSI marked as true (fully met), partial (partially met), or false (not met). Assessment deliverables were gathered, and assessment testing was documented within the Paramify, Inc. tool Paramify. The Paramify tool allows for machine readable export of the assessment results and allows Flock to deliver assessment deliverables to the FedRAMP PMO as needed.'
