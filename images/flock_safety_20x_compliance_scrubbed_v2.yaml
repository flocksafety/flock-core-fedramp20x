Package:
  CSPName: Flock Safety
  CSO: Flock Safety
  impact: Low
  summaryOfCSO: Flock Safety is a public safety solution that assists cities, businesses,
    schools, and law enforcement agencies in collaboratively eliminating crime and
    maintaining community safety. Flock develops and manufactures license plate reading
    (LPR) technology, audio recognition sensors, video cameras, and accompanying software
    to capture objective evidence required by law enforcement to solve crimes.
  Assessments:
  - Assessment:
      digitalSignature: 9eea08c10aab2fcc09a17eb984b56e4bc3c834c9608600c60187bb63f7829792
      assessorOrg: Moss Adams LLP
      date: 7/21/2025
      leadAssessor: Scott Hoopes
      recommendation: Authorize
      remarks: Flock Safety demonstrated a sufficient security posture and achieved
        satisfactory results against most FedRAMP Low Key Security Indicators (KSIs).
        Flock was able to quickly provide strong evidence of passed KSI implementations,
        often exceeding the Low baseline requirements. Furthermore, Flock maintains
        a mature Governance, Risk, and Compliance (GRC) framework and takes a proactive
        approach to managing security and compliance obligations.
      KSIs:
